name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy gp-intake Edge Function
        run: supabase functions deploy gp-intake --project-ref tkkldjbasyhvxhjnqdht
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Disable JWT verification on gp-intake
        run: |
          curl -X PATCH \
            "https://api.supabase.com/v1/projects/tkkldjbasyhvxhjnqdht/functions/gp-intake" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"verify_jwt": false}'
